app_version: 1.0.0
name: ansible_semaphore 
description: Shuffle integration for Ansible Semaphore
contact_info:
  name: "@davedhaval"
  url: https://infopercept.com
  email: dhavaldave055@gmail.com
tags:
  - ansible
categories:
  - Assets
authentication:
  required: true
  parameters:
    - name: url 
      description: Semaphore URL
      example: "https://<IP>:<PORT>"
      required: true
      schema:
        type: string
    - name: username 
      description: The username to use
      example: "*****"
      required: true
      schema:
        type: string
    - name: password
      description: The password to use 
      example: "*****"
      required: true
      schema:
        type: string
actions:
  - name: list_inventories
    description: Lists all Inventory
    parameters:
      - name: project_id 
        description: Your Project ID
        example: "1"
        required: true
    returns:
      schema:
        type: string
  - name: list_tasks
    description: Lists all tasks in Project
    parameters:
      - name: project_id 
        description: Your Project ID
        example: "1"
        required: true
    returns:
      schema:
        type: string
  - name: run_task
    description: Run a task
    parameters:
      - name: project_id 
        description: Your Project ID
        example: "1"
        required: true
      - name: template_id 
        description: Template ID
        example: "1"
        required: true
      - name: debug 
        description: Your Project ID
        options:
          - false 
          - true 
        required: true
      - name: dryrun 
        description: Dryrun check
        options:
          - false
          - true 
        required: true
    returns:
      schema:
        type: string
large_image: data:image/jpeg;base64,

